<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offlands</title>
  <link rel="stylesheet" href="./public/style.css" />
  <script type="module" src="./public/src/main.js"></script>
</head>
<body>
  <main id="game-shell">
    <canvas id="game" width="1024" height="576"></canvas>

    <section id="mainMenu" class="menu-screen">
      <div id="menuTitleScreen" class="menu-card menu-view">
        <h1 class="wavy-title" aria-label="Offlands">
          <span style="--i:0">O</span><span style="--i:1">F</span><span style="--i:2">F</span><span style="--i:3">L</span><span style="--i:4">A</span><span style="--i:5">N</span><span style="--i:6">D</span><span style="--i:7">S</span>
        </h1>
        <p class="tagline">Explore strange worlds. Fight random creatures. Craft weird weapons.</p>
        <button id="playButton" class="primary-action" type="button">Play</button>
      </div>

      <div id="modeSelectScreen" class="menu-card menu-view hidden">
        <div class="panel-title">Choose Mode</div>
        <button id="singlePlayerButton" class="primary-action" type="button">Single Player</button>
        <button id="multiplayerButton" class="primary-action alt-action" type="button">Multiplayer</button>
        <button id="modeBackButton" type="button">Back</button>
      </div>

      <div id="multiplayerBrowserScreen" class="menu-card menu-view hidden">
        <div class="panel-title">Public Servers</div>
        <input id="nameInput" maxlength="18" aria-label="Player name" />
        <div id="lobbyList" class="lobby-list"></div>
        <div class="menu-grid compact-grid">
          <button id="refreshLobbiesButton" type="button">Refresh</button>
          <button id="openCreateServerButton" type="button">Create Server</button>
          <button id="multiplayerBackButton" type="button">Back</button>
        </div>
        <div class="private-join-row">
          <input id="codeInput" maxlength="6" placeholder="PRIVATE CODE" aria-label="Private code" />
          <button id="joinCodeButton" type="button">Join Private Code</button>
        </div>
        <button id="leaveButton" type="button">Leave Current Server</button>
        <div id="multiplayerStatus" class="tiny">Choose a public server, create one, or join a private code.</div>
      </div>

      <div id="createServerScreen" class="menu-card menu-view hidden">
        <div class="panel-title">Create Server</div>
        <div class="server-type-row">
          <button id="serverPublicToggle" class="selected" type="button">Public</button>
          <button id="serverPrivateToggle" type="button">Private</button>
        </div>
        <input id="serverNameInput" maxlength="32" value="Offlands Server" aria-label="Server name" />
        <input id="privateCodeInput" class="hidden" maxlength="6" placeholder="PRIVATE CODE" aria-label="Private server code" />
        <button id="createServerButton" class="primary-action" type="button">Create</button>
        <button id="createBackButton" type="button">Back</button>
      </div>
    </section>

    <section id="hud" aria-label="Game status">
      <div class="hud-row">
        <strong id="healthText" class="heart-row" aria-label="Health"></strong>
        <span id="levelText">Level 1 | XP 0 / 50</span>
        <span id="weaponText">Stick Sword</span>
      </div>
      <div id="resourceText" class="resource-line"></div>
      <div id="statusText" class="status-line">Loading Offlands...</div>
    </section>

    <section id="craftingPanel" class="panel hidden">
      <div class="panel-title">Crafting</div>
      <div id="recipeList"></div>
    </section>

    <section id="inventoryPanel" class="panel hidden">
      <div class="panel-title">Inventory</div>
      <div id="inventoryDetails" class="tiny">Selected: empty</div>
      <div id="inventoryGrid" class="inventory-grid"></div>
      <div class="panel-title small-title">Hotbar</div>
      <div id="inventoryHotbar" class="inventory-grid hotbar-grid"></div>
    </section>

    <section id="creatureInfoPanel" class="panel creature-panel hidden">
      <button id="closeCreatureInfoButton" class="icon-button close-button" type="button" aria-label="Close creature info">X</button>
      <div id="creatureInfoContent"></div>
    </section>

    <section id="creatureCodexPanel" class="panel codex-panel hidden">
      <button id="closeCodexButton" class="icon-button close-button" type="button" aria-label="Close creature codex">X</button>
      <div class="panel-title">Creature Codex</div>
      <button class="codex-tab selected" type="button">Creature</button>
      <div id="creatureCodexList" class="codex-list"></div>
      <div id="creatureCodexDetail" class="codex-detail"></div>
    </section>

    <section id="hotbar" aria-label="Hotbar"></section>
    <pre id="debugOverlay"></pre>
  </main>
</body>
</html>
